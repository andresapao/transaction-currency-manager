spring:
  application:
    name: transactions-currency-manager
  datasource:
    url: jdbc:h2:mem:transactionsdb
    username: app
    password: app
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
      platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console
external:
  fiscal:
    # Full endpoint for rates of exchange (used by CurrencyGatewayImpl)
    rates-url: "https://api.fiscaldata.treasury.gov/services/api/fiscal_service/v1/accounting/od/rates_of_exchange"

# application.yml
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  packages-to-scan: org.transactions.currency.controller
